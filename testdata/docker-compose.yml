version: '3.9'

services:
  web:
    image: my-web:latest
    container_name: myapp_web
    build:
      context: ./web
    ports:
      - "127.0.0.1:3000:80"
    environment:
      API_URL: "http://api:8080"
    depends_on:
      - api

  api:
    image: my-api:latest
    container_name: myapp_api
    build:
      context: ./api
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: "postgres://db:5432/myapp"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: myapp_db
    environment:
      POSTGRES_DB: myapp
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
