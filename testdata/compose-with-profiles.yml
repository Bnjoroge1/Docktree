version: '3.9'

services:
  ui:
    image: my-ui:latest
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api

  api:
    image: my-api:latest
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: "postgres://db:5432/myapp"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: myapp
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data

  seed:
    image: my-api:latest
    profiles:
      - seed
    environment:
      DATABASE_URL: "postgres://db:5432/myapp"
      SEED_MODE: "true"
    depends_on:
      - db
    command: rake db:seed

  debug:
    image: nicolaka/netshoot:latest
    profiles:
      - debug
    depends_on:
      - api
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    profiles:
      - cache
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  db_data:
