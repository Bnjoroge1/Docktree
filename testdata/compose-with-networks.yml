version: '3.9'

services:
  ui:
    image: my-ui:latest
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - frontend
    depends_on:
      - api

  api:
    image: my-api:latest
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - frontend
      - backend
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend
    environment:
      POSTGRES_DB: myapp
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    networks:
      - backend
    ports:
      - "127.0.0.1:6379:6379"

  external_service:
    image: external-svc:latest
    networks:
      - shared_network
    environment:
      EXTERNAL_URL: "http://shared-db:5432"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  shared_network:
    external: true
    name: shared_infra

volumes:
  db_data:
