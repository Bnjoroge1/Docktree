version: '3.9'

# Canonical e2e fixture for shared services testing.
# Platform-tier services: db, redis, garage.
# Worktree-tier services: api, ui, worker.

services:
  ui:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3000:80"
    environment:
      API_URL: "http://api:8080"
    depends_on:
      - api

  api:
    image: python:3.12-slim
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: "postgres://postgres:secret@db:5432/myapp"
      REDIS_URL: "redis://redis:6379"
      S3_ENDPOINT: "http://garage:3900"
    depends_on:
      - db
      - redis

  worker:
    image: python:3.12-slim
    environment:
      DATABASE_URL: "postgres://postgres:secret@db:5432/myapp"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

  garage:
    image: dxkite/garage:latest
    ports:
      - "127.0.0.1:3900:3900"
    environment:
      GARAGE_RPC_BIND_ADDR: "0.0.0.0:3901"

networks:
  default:

volumes:
  db_data:
