version: 2

project_name: docktree

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: docktree
    main: ./cmd/docktree
    binary: docktree
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/bnjoroge/docktree/internal/cli.version={{.Version}}

archives:
  - id: default
    formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: "^feat"
    - title: "Bug Fixes"
      regexp: "^fix"
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: Bnjoroge1
    name: Docktree
  draft: false
  prerelease: auto

homebrew_casks:
  - name: docktree
    repository:
      owner: Bnjoroge1
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser
      email: goreleaser@users.noreply.github.com
    directory: Casks
    homepage: "https://github.com/Bnjoroge1/Docktree"
    description: "Run Docker Compose services across multiple git worktrees without port conflicts"
    license: "MIT"
    skip_upload: auto
